lists:
  - name: Tuin
    group: Tuin
    items:
      - label: Terrasstegels ophogen
        description: In de tuin zijn er een aantal terrasstegels verzakt deze moeten weer op hoogte worden gebracht.
      - label: Grindpad vervangen door leempad
        description: Het grindpad vervangen voor een leempad zodat het makkelijker is om er overheen te lopen.
      - label: Witte stenen oprit leggen
        description: Op de oprit wil ik graag witte stenen leggen.
      - label: Klimop palen oprit plaatsen
        description: Op de oprit wil ik graag horizontale en verticale hardhouten palen waarmee ik klimop kan laten groeien.
      - label: Douglas palen voortuin plaatsen
        description: In de voortuin wil ik een aantal douglas palen plaatsen.
      - label: Vlaggenmast voortuin plaatsen
        description: Een vlaggenmast plaatsen in de voortuin.
      - label: Leibomen constructie achtertuin
        description: Leibomen constructie en bomen plaatsen in de achtertuin.
      - label: Schommel tuin plaatsen
        description: Een schommel plaatsen in de tuin.
      - label: Hangmat ophangen in tuin
        description: De hangmat ophangen in de tuin zodat ik er lekker in kan liggen.
      - label: Grasmaaier huisje bouwen
        description: De grasmaaier in de tuin een huisje geven zodat hij droog staat en niet in de weg ligt.
      - label: Schaduwdoek zijtuin plaatsen
        description: In de zijtuin een schaduwdoek plaatsen zodat het daar in de zomer koeler is.
      - label: Sfeerverlichting tuin
        description: In de tuin verlichting maken zodat er meer sfeer is.
      - label: Lamp achterkant tuin repareren
        description: De lamp in de achterkant van de tuin lampen geven zodat hij weer aangaat.
      - label: Deurhaken tuindeuren boren
        description: De haken in de deur boren van de tuin zodat ze open kunnen blijven staan.
      - label: Insectenhotel kopen en installeren
        description: Een insectenhotel kopen en installeren.
      - label: Vogelhuisje aansluiten op homeassistant
        description: Het vogelhuisje in de achtertuin moet weer aangesloten worden via home assistant zodat ik de fotos te zien krijg.
      - label: Tuinbesproeiing weer aanzetten
        description: Water besproeiing weer aanzetten in de tuin zodat de planten water krijgen.
      - label: Poort opnieuw verven
        description: De poort opnieuw verven want het lak gaat er af.
  - name: Grote tuin klussen
    group: Tuin
    items:
      - label: Aluminium overkapping tuin bouwen
        description: Aluminium overkapping maken in de tuin zodat ik er ook bij slecht weer kan zitten.
      - label: Kattenluik schuur met eten en drinken
        description: Kattenluik in de schuur maken met eten en drinken.
  - name: Onderhoud binnen
    group: Klussen
    items:
      - label: Rolgordijnen rails opnieuw vastkitten
        description: De rolgordijnen rails laten op bepaalde plekken los. Deze weer vast kitten.
      - label: Plinten werkkamer herstellen
        description: In de werkkamer zijn de plinten beschadigd en sommige ontbreken.
      - label: Badkamer knieschot openen voor opslag
        description: De badkamer knieschot openmaken zodat ik er spulletjes in kan stoppen.
      - label: Schommel rubber voorkamer vervangen
        description: De schommel in de voorkamer heeft rubbertjes die loslaten.
      - label: Gaten vullen
      - label: Plafond zolder herstellen
        description: Op zolder moet het plafond hersteld worden.
      - label: Reserve wieltjes argenta gordijnrails bestellen
        description: Reserve wieltjes voor de argenta gordijnrails bestellen zodat ik ze kan vervangen als ze kapot zijn.
      - label: Schuur opruimen
        description: De schuur opruimen zodat er meer ruimte is en het er weer netjes uitziet.
      - label: Automatische gordijnrails ophangen
        description: Automatische gordijnrails kopen en ophangen.
      - label: Zonwering met zuignap ramen
        description: Zonwering met zuignap voor ramen plaatsen in de zomer.
      - label: Mos schilderij kopen
        description: Idee is om een schilderij van mos te kopen.
      - label: Trap opnieuw kitten
        description: De trap opnieuw kitten.
  - name: Verbouwen
    group: Klussen
    items:
      - label: Naamplaat bij voordeur plaatsen
        description: Naamplaat bij de voordeur plaatsen zodat mensen weten dat ze bij mij zijn.
      - label: Muren woonkamer verven
        description: Muren in de woonkamer verven zodat het er frisser uitziet.
      - label: Tegels keuken plaatsen
        description: In de keuken tegeltjes plaatsen zodat het er mooier uitziet en makkelijker schoon te maken is.
      - label: Keuken schiereiland maken
        description: Schiereiland maken in de keuken. Je kunt online stalen bartafelframes kopen.
      - label: Vloerkleed keuken leggen
        description: In de keuken een vloerkleed leggen.
      - label: Fotolijstjes aan wand hangen
        description: Een fotolijstjes aan de wand hangen zodat het er gezelliger uitziet.
      - label: Planten woonkamer en keuken
        description: In de woonkamer en keuken planten plaatsen zodat het er gezelliger uitziet.
      - label: Extra verlichting woonkamer keuken werkkamer
        description: Meer verlichting in woonkamer keuken en werkkamer.
      - label: Deur kamer Melle bestellen
        description: Voor Melle kamer een deur bestellen zodat je een extra kamer van kan maken.
  - name: Grote klussen
    group: Klussen
    items:
      - label: Vliering maken op zolder
        description: Vliering maken op zolder.
      - label: Roomdivider muren verven
        description: Roomdivider muren verven.
      - label: Roomdivider kasten maken
        description: Roomdivider kasten maken.
      - label: Roomdivider ramen glas in lood bestellen
        description: Roomdivider ramen bestellen glas in lood.
      - label: Schakelaar en verlichting badkamer aanleggen
        description: Schakelaar en verlichting badkamer maken.
  - name: Netwerk & infra
    group: Techniek
    items:
      - label: Netwerkkabels aanleggen in kabelgoten
        description: Op diverse plaatsen zijn er geen netwerkkabels in de kabelgoten.
      - label: Netwerk switch bij bureau werkkamer
        description: Alle devices in de werkkamer een netwerkstekker geven.
      - label: Beveiligingscamera systeem met Raspberry Pi
        description: Video camera systeem installeren in en rondom het huis. Een raspberry pi met motioneye os installeren zodat ik het systeem zelf kan beheren.
      - label: Sonos opnieuw ophangen werkkamer
        description: Sonos devices opnieuw ophangen in de werkkamer.
      - label: Nintendo Switch met Logitech muziekbox werkkamer
        description: Nintendo switch installeren werkkamer met een muziek box van logitech zodat je ze kan horen.
      - label: Fotos lokaal hosten zonder icloud
        description: Alle fotos lokaal hosten zodat ik geen icloud subscription meer nodig heb.
  - name: Home Assistant
    group: Techniek
    items:
      - label: Stroomverbruik meten via homeassistant
        description: De stroommeters aansluiten in homeassistant en dan bekijken wat het verbruik is van de apparaten in huis.
      - label: Buitenverlichting automatiseren op lux en tijd
        description: In homeassistant de buitenverlichting tijden instellen zodat ze automatisch aan en uit gaan, ook op basis van de lux sensor.
      - label: Lux sensoren gordijnen vervangen
        description: De lux sensoren in de gordijnen nieuw bestellen. De huidige zijn niet goed genoeg.
      - label: Lux meter met hoger bereik bestellen
        description: Nieuwe lux meter bestellen en kopen die een hoger bereik aankan.
      - label: Homeassistant notificaties instellen
        description: Notificaties instellen in homeassistant zodat ik weet wanneer er iets gebeurt in huis.
      - label: Bewegingsalarm bij afwezigheid
        description: In homeassistant een alarm krijgen als ik weg ben en er beweging is in huis.
      - label: Bewegingsalarm tijdens slapen begane grond
        description: In homeassistant als ik slaap en er is beweging op de begane grond.
      - label: Deuren automatisch op slot bij vertrek
        description: Als ik wegga direct de deuren op slot doen.
      - label: Notificatie bij verlaten homeassistant zone
        description: Notificatie wanneer ik weg ben bij homeassistant zone.
      - label: Roomba integreren in homeassistant
        description: In homeassistant roomba robots integreren zodat ze afgaan wanneer ik de woning verlaat.
      - label: Alexa devices instellen
        description: Alexa devices verder instellen.
      - label: Homeassistant voice control via Alexa
        description: Met Alexa instellen dat ik home assistant voice control kan gebruiken.
      - label: Kattenvoer schema homeassistant
        description: In homeassistant een schema maken voor katten maximaal eten zodat ik weet wanneer ik ze eten moet geven.
      - label: Kattenlokatie in homeassistant bijhouden
        description: In homeassistant configureren dat ik de locatie van de katten kan zien.
      - label: Roblox blokkeren via homeassistant
        description: In homeassistant instellen dat ik roblox kan killen.
      - label: Wekker uitschakelen via homeassistant
        description: In homeassistant de mogelijkheid om geen wekker te zetten zodat ik niet wakker word van een wekker.
      - label: Gordijnen automatisering homeassistant verbeteren
        description: In homeassistant lijkt het alsof sommige gordijnen niet goed open en dicht gaan.
      - label: Extra accupakket gordijnen
        description: Een extra accupakket voor de gordijnen zodat ik ze vaker kan gebruiken zonder dat ik ze steeds op hoef te laden.
      - label: Lichten woonkamer en hal combineren
        description: In homeassistant de lichten in de woonkamer en hal combineren zodat ze samen aan en uit kunnen.
      - label: Lampen automatisch aan bij thuiskomst
        description: Als ik aankom dan de lampen aanzetten als er niemand thuis is en de lux is goed.
      - label: Woningafsluiting schakelaars homeassistant verbeteren
        description: De schakelaars in homeassistant beter instellen. Bv afsluiten van de woning op een andere plek.
      - label: Slaapkamer lamp uit bij woning afsluiten
        description: Bij het afsluiten van de woning ging de slaapkamer lamp niet uit.
      - label: Camera motion stand voorkomen bij away klik
        description: Als je binnenkomt en met homeassistant toevallig op away klikt gaan de cameras in huis in motion stand.
      - label: Aanrechtlamp niet aan bij thuiskomst oplossen
        description: Soms gaat de aanrechtlamp niet aan als ik binnen kom van homeassistant.
      - label: Snooze zonder geluid via Alexa
        description: Bij het snoozen niet via alexa een geluid maken dat je snoozed.
      - label: Spotify playlist aanmaken voor homeassistant
        description: Een custom playlist in spotify aanmaken die ik in homeassistant aan kan zetten.
      - label: Homeassistant errors oplossen
        description: De errors in homeassistant nalopen en oplossen. Soms home assistant sonos unjoin failure.
      - label: Planten met sensoren bewaken
        description: Meer planten kopen en ze een sensor geven.
  - name: Displays & monitoring
